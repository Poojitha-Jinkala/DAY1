<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poojitha</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: sans-serif;
            background: #f7f7f7;
        }

        .clock {
            position: relative;
            width: 300px;
            height: 300px;
        }

        .ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            transition: background 0.5s linear;
            /* add a gentle pulse so seconds ring breathes */
            animation: pulse 2s infinite;
        }

        .ring.hours {
            width: 300px;
            height: 300px;
        }

        .ring.minutes {
            width: 230px;
            height: 230px;
        }

        .ring.seconds {
            width: 160px;
            height: 160px;
        }

        /* keyframes for pulse animation */
        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(0.98); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        /* labels for rings */
        .label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: bold;
            color: #333;
            pointer-events: none;
        }
        .label.hours { font-size: 2rem; }
        .label.minutes { font-size: 1.5rem; }
        .label.seconds { font-size: 1rem; }
    </style>
</head>
<body>
    <h1>Poojitha clock</h1>

    <!-- Unique digital clock without numbers or hands -->
    <div class="clock" id="clock">
        <div class="ring hours" id="hoursRing"></div>
        <div class="ring minutes" id="minutesRing"></div>
        <div class="ring seconds" id="secondsRing"></div>
        <!-- labels help distinguish the rings without numbers -->
        <div class="label hours">H</div>
        <div class="label minutes">M</div>
        <div class="label seconds">S</div>
    </div>
    <!-- textual readout of the current time -->
    <div id="timeText" style="margin-top:1rem; font-size:1.25rem;"></div>
    <!-- legend for color meaning -->
    <div id="legend" style="margin-top:0.5rem; font-size:1rem; display:flex; gap:1rem;">
        <span><span style="display:inline-block;width:12px;height:12px;background:#ff6b6b;margin-right:0.25rem;"></span>Hours</span>
        <span><span style="display:inline-block;width:12px;height:12px;background:#4ecdc4;margin-right:0.25rem;"></span>Minutes</span>
        <span><span style="display:inline-block;width:12px;height:12px;background:#1a535c;margin-right:0.25rem;"></span>Seconds</span>
    </div>

    <script>
        // update rings based on current time
        function updateClock() {
            const now = new Date();
            const hrs = now.getHours();
            const mins = now.getMinutes();
            const secs = now.getSeconds();
            const hoursFraction = hrs / 24; // fraction of full day
            const minutesFraction = mins / 60;
            const secondsFraction = secs / 60;

            const hoursRing = document.getElementById('hoursRing');
            const minutesRing = document.getElementById('minutesRing');
            const secondsRing = document.getElementById('secondsRing');

            hoursRing.style.background = `conic-gradient(#ff6b6b ${hoursFraction * 360}deg, transparent 0)`;
            minutesRing.style.background = `conic-gradient(#4ecdc4 ${minutesFraction * 360}deg, transparent 0)`;
            secondsRing.style.background = `conic-gradient(#1a535c ${secondsFraction * 360}deg, transparent 0)`;
        }

        // tick every second
        setInterval(updateClock, 1000);
        updateClock();

        // update textual display as well
        function updateText() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2,'0');
            const m = String(now.getMinutes()).padStart(2,'0');
            const s = String(now.getSeconds()).padStart(2,'0');
            document.getElementById('timeText').textContent = `${h}:${m}:${s}`;
        }
        setInterval(updateText, 1000);
        updateText();
    </script>
</body>
</html>
